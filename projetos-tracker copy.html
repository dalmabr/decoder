<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAT-SIA | Tracker de Projetos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* base.css define padding no body — zeramos aqui */
    body{padding:0!important}
    /* ── Tracker ── */
    .pt-section{background:white;border-radius:var(--radius-lg);padding:var(--space-lg);width:100%;max-width:none;margin:var(--space-lg) auto;box-sizing:border-box}
    .pt-section-title{font-size:1rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--marrom);opacity:.8;line-height:1.4;margin:0 0 calc(var(--space-lg) + 0.25rem)}
    .pt-dropzone{border:1px solid #d6c4d1;border-radius:18px;padding:28px 24px;text-align:center;cursor:pointer;transition:var(--transition);background:#fff;box-shadow:0 10px 24px rgba(60,46,38,.08);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .pt-dropzone:hover,.pt-dropzone.pt-drag-over{border-color:var(--verde);background:#f7faf5}
    .pt-dropzone-icon{font-size:38px;margin-bottom:16px}
    .pt-dropzone p{margin:0;color:#3b322c;font-size:15px;line-height:1.5}
    .pt-dropzone strong{color:#1f2937}
    .pt-dropzone small{display:block;margin-top:10px;font-size:13px;color:#6b7280}
    #pt-results{margin-top:var(--space-md)}
    .pt-toolbar{margin-bottom:var(--space-sm)}
    .pt-table-wrap{overflow-x:auto;margin-top:var(--space-sm)}
    .pt-id{font-family:var(--font-mono);font-size:12px;color:#4b5563;white-space:nowrap}
    .pt-date{font-family:var(--font-mono);font-size:11.5px;white-space:nowrap;color:#6b7280}
    .pt-resumo{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--marrom)}
    .pt-alert td{background:#fff7ed!important}
    .pt-alert:hover td{background:#ffedd5!important}
    .pt-empty{text-align:center;color:#9ca3af;font-size:13px;padding:var(--space-lg) 0}
    .pt-hint{font-size:12px;color:#9ca3af;margin:var(--space-xs) 0}
  </style>
</head>
<body data-page="projetos">

  <!-- Header idêntico ao index.html -->
  <div id="site-header"></div>

  <!-- MAIN — pt-24 compensa o nav fixed do header.js -->
  <main class="pt-24">
    <section class="pt-section">
      <h2 class="view-title">Status dos Itens de Backlog</h2>

      <div class="pt-dropzone" id="pt-dropzone" role="button" tabindex="0">
        <div class="pt-dropzone-icon">📂</div>
        <p>Arraste o arquivo CSV aqui ou <strong>clique para selecionar</strong></p>
        <small>Formato: ID · Tipo · Status · Dt Início · Prazo Final · Dt Modificação · Resumo</small>
        <input type="file" id="pt-file-input" accept=".csv" class="hidden">
      </div>

      <div id="pt-empty-state" style="text-align:center;padding:40px 0;color:#9ca3af;font-size:13px">
        Nenhum arquivo carregado.
      </div>

      <div id="pt-results" class="hidden">
        <div class="pt-toolbar">
          <div class="filtros-container">
            <input type="search" id="pt-search" placeholder="Pesquisar..." class="table-search" aria-label="Pesquisar projetos">
            <select id="pt-status-filter" class="filtro-select" aria-label="Situação">
              <option value="">Todas as Situações</option>
              <option value="Em Andamento">Em Andamento</option>
              <option value="Pendente">Pendente</option>
              <option value="Em Validação">Em Validação</option>
              <option value="Concluído">Concluído</option>
              <option value="Cancelado">Cancelado</option>
            </select>
            <button class="btn-action" id="pt-btn-novo">✕ Novo arquivo</button>
          </div>
        </div>

        <div class="pt-table-wrap" id="pt-results-body"></div>
        <div class="paginacao hidden" id="pt-table-footer"></div>
      </div>
    </section>
  </main>

  <script src="js/ui/header.js"></script>
  <script>
  // Marca "Projetos" como ativo no header após ele ser carregado
  document.addEventListener('DOMContentLoaded', () => {
    const projetosLink = document.querySelector('#site-header [data-nav-link="Projetos"]');
    if (projetosLink) projetosLink.classList.add('bg-slate-100');
  });
  </script>
  <script>
  const ProjetosTracker = (() => {
    let allRows = [], headers = [];
    let controleSortState = { key: 'id', asc: true };
    let searchTerm = '';
    let statusFilter = '';
    let currentPage = 1;
    const pageSize = 15;

    // Detecta delimitador automaticamente (tab ou vírgula)
    function detectDelimiter(line) {
      const tabs=(line.match(/\t/g)||[]).length;
      const commas=(line.match(/,/g)||[]).length;
      return tabs>=commas ? '\t' : ',';
    }

    let DELIM='\t';

    function parseCsvLine(line) {
      const fields=[]; let field='', inQuotes=false;
      for (let i=0;i<line.length;i++) {
        const ch=line[i], code=line.charCodeAt(i);
        // Preserva tab quando usado como delimitador; filtra o resto de inválidos
        if (code!==9 && !((code>=32&&code<=126)||(code>=128&&code<=255))) continue;
        if (code===255||code===254) continue;
        if (ch==='"') {
          if (inQuotes&&line[i+1]==='"') { field+='"'; i++; } // "" = aspas literal
          else { inQuotes=!inQuotes; }
        } else if (ch===DELIM&&!inQuotes) {
          fields.push(field.trim()); field='';
        } else {
          field+=ch;
        }
      }
      fields.push(field.trim());
      return fields;
    }

    function parseDate(str) {
      if (!str||str.length<10) return str||'';
      const s=str.trim(); let d;
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        d=new Date(s.replace(' ','T'));
      } else if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
        const [dd,mm,yyyy]=s.split('/');
        d=new Date(`${yyyy}-${mm}-${dd}T${s.length>10?s.slice(11,16):'00:00'}`);
      } else return str;
      if (isNaN(d)) return str;
      return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    function processCsv(text) {
      const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
      DELIM=detectDelimiter(lines[0]); // auto-detecta tab vs vírgula
      headers=parseCsvLine(lines[0]); allRows=[];
      for (let i=1;i<lines.length;i++) {
        const cols=parseCsvLine(lines[i]);
        if (cols.every(c=>!c)) continue;
        const row=cols.map((v,idx)=>(idx>=3&&idx<=5)?parseDate(v):v);
        while(row.length<7) row.push('');
        allRows.push(row.slice(0,7));
      }
    }

    function applySearch(rows) {
      const term = searchTerm.trim().toLowerCase();
      return rows.filter(row => {
        const matchesText = !term || row.some(value => String(value || '').toLowerCase().includes(term));
        const matchesStatus = !statusFilter || row[2] === statusFilter;
        return matchesText && matchesStatus;
      });
    }

    function paginateRows(rows, page, size) {
      const totalPages = Math.max(1, Math.ceil(rows.length / size));
      const current = Math.min(Math.max(1, page), totalPages);
      const start = (current - 1) * size;
      return rows.slice(start, start + size);
    }

    function renderFooter(totalRows) {
      const footer = document.getElementById('pt-table-footer');
      if (!footer) return;
      if (!totalRows) {
        footer.classList.add('hidden');
        footer.innerHTML = '';
        return;
      }
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      currentPage = Math.min(currentPage, totalPages);
      const start = Math.min((currentPage - 1) * pageSize + 1, totalRows);
      const end = Math.min(currentPage * pageSize, totalRows);
      footer.classList.remove('hidden');
      footer.innerHTML = `
        <div>Mostrando ${start}-${end} de ${totalRows}</div>
        <div class="pag-buttons">
          <button class="pag-btn" type="button" data-action="prev" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>
          <button class="pag-btn" type="button" data-action="next" ${currentPage === totalPages ? 'disabled' : ''}>Próximo</button>
        </div>`;
      footer.querySelector('button[data-action="prev"]')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderAll(); } });
      footer.querySelector('button[data-action="next"]')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderAll(); } });
    }

    const groupByStatus=()=>{const g={};for(const r of applySearch(allRows)){const s=r[2]||'(sem status)';g[s]=(g[s]||0)+1;}return g;};
    const filterByStatus=s=>applySearch(allRows).filter(r=>r[2]===s);

    function parseLocalDate(str) {
      if (!str) return null;
      const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})[,\s]+(\d{2}:\d{2})/);
      if (m) return new Date(`${m[3]}-${m[2]}-${m[1]}T${m[4]}`);
      const d = new Date(str);
      return isNaN(d) ? null : d;
    }

    function prepareControleRows(rows = applySearch(allRows)) {
      const now = new Date();
      return rows.map((row) => {
        const dataInicio = parseLocalDate(row[3]);
        const dataMod = parseLocalDate(row[5]) || now;
        const base = row[2] === 'Em Andamento' ? now : dataMod;
        const horas = dataInicio ? Math.max(0, (base - dataInicio) / 36e5) : 0;
        const horasTotal = Math.round(horas * 100) / 100;
        return {
          id: row[0] || '',
          tipo: row[1] || '',
          status: row[2] || '',
          dtInicio: row[3] || '',
          prazoFinal: row[4] || '',
          dtModificacao: row[5] || '',
          resumo: row[6] || '',
          horasTotal,
          dias: Math.round((horasTotal / 24) * 10) / 10,
          highlight: row[2] === 'Em Andamento' && horasTotal > 72
        };
      });
    }

    function sortControleRows(rows, key, asc) {
      return [...rows].sort((a, b) => {
        const va = a[key] ?? '';
        const vb = b[key] ?? '';
        if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
        return asc
          ? String(va).localeCompare(String(vb), 'pt-BR', { numeric: true })
          : String(vb).localeCompare(String(va), 'pt-BR', { numeric: true });
      });
    }

    const COLS=['ID','Tipo','Status','Dt. Início','Prazo Final','Dt. Modificação','Resumo'];
    const SB={'Em Andamento':'badge-default','Pendente':'badge-default','Em Validação':'badge-default','Concluído':'badge-default','Cancelado':'badge-default'};
    const badge=s=>`<span class="pt-badge">${s}</span>`;

    function renderControle(rows,id){
      const el=document.getElementById(id);if(!el)return;
      if(!rows.length){el.innerHTML='<p class="pt-empty">Sem dados.</p>';return;}
      const columns=[
        {key:'id',label:'ID',sortable:true},
        {key:'tipo',label:'Tipo',sortable:true},
        {key:'status',label:'Status',sortable:true},
        {key:'dtInicio',label:'Dt. Início',sortable:true},
        {key:'prazoFinal',label:'Prazo Final',sortable:true},
        {key:'dtModificacao',label:'Dt. Modificação',sortable:true},
        {key:'resumo',label:'Resumo',sortable:false}
      ];
      const thead=columns.map(col=>{
        const sorted=controleSortState.key===col.key;
        const arrow=sorted ? (controleSortState.asc ? ' ▲' : ' ▼') : '';
        return `<th class="${col.sortable?'sortable':''}" data-sort-key="${col.key}">${col.label}${arrow}</th>`;
      }).join('');
      const rowsHtml=rows.map(c=>`
        <tr class="${c.highlight?' pt-alert':''}">
          <td class="pt-id">${c.id}</td>
          <td>${c.tipo}</td>
          <td><span class="badge-status badge-pending">${c.status}</span></td>
          <td class="pt-date">${c.dtInicio}</td>
          <td class="pt-date">${c.prazoFinal}</td>
          <td class="pt-date">${c.dtModificacao}</td>
          <td class="pt-resumo" title="${(c.resumo||'').replace(/"/g,'&quot;')}">${c.resumo || ''}</td>
        </tr>`).join('');
      const colgroup='<colgroup><col style="width:90px"><col style="width:110px"><col style="width:110px"><col style="width:120px"><col style="width:120px"><col style="width:120px"><col></colgroup>';
      el.innerHTML=`<table class="data-table-short">${colgroup}<thead><tr>${thead}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
      el.querySelectorAll('th.sortable').forEach(th=>{
        th.addEventListener('click',()=>{
          const key=th.dataset.sortKey;
          if(!key)return;
          if(controleSortState.key===key) controleSortState.asc=!controleSortState.asc;
          else {controleSortState.key=key; controleSortState.asc=true;}
          renderControle(sortControleRows(rows,controleSortState.key,controleSortState.asc),id);
        });
      });
    }

    function renderAll(){
      const controle=prepareControleRows();
      const sorted=sortControleRows(controle,controleSortState.key,controleSortState.asc);
      renderControle(paginateRows(sorted,currentPage,pageSize), 'pt-results-body');
      renderFooter(sorted.length);
      document.getElementById('pt-results').classList.remove('hidden');
      document.getElementById('pt-empty-state').classList.add('hidden');
      document.getElementById('pt-dropzone').classList.add('hidden');
    }

    function loadFile(file){
      if(!file.name.toLowerCase().endsWith('.csv')){alert('Selecione um .csv');return;}
      const r=new FileReader();
      r.onload=e=>{try{processCsv(e.target.result);renderAll();}catch(err){console.error(err);alert('Erro: '+err.message);}};
      r.readAsText(file,'UTF-8');
    }

    function init(){
      const dz=document.getElementById('pt-dropzone'),fi=document.getElementById('pt-file-input');
      if(!dz||!fi)return;
      dz.addEventListener('click',()=>fi.click());
      dz.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')fi.click();});
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('pt-drag-over');});
      dz.addEventListener('dragleave',()=>dz.classList.remove('pt-drag-over'));
      dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('pt-drag-over');const f=e.dataTransfer.files[0];if(f)loadFile(f);});
      fi.addEventListener('change',()=>{if(fi.files[0])loadFile(fi.files[0]);});
      document.getElementById('pt-search')?.addEventListener('input',(e)=>{
        searchTerm=e.target.value;
        currentPage=1;
        renderAll();
      });
      document.getElementById('pt-status-filter')?.addEventListener('change',(e)=>{
        statusFilter=e.target.value;
        currentPage=1;
        renderAll();
      });
      document.getElementById('pt-btn-novo')?.addEventListener('click',()=>{
        allRows=[];headers=[];searchTerm='';statusFilter='';
        document.getElementById('pt-results').classList.add('hidden');
        document.getElementById('pt-empty-state').classList.remove('hidden');
        document.getElementById('pt-dropzone').classList.remove('hidden');
        fi.value='';
        document.getElementById('pt-search').value='';
        document.getElementById('pt-status-filter').value='';
      });
    }
    return{init};
  })();
  document.addEventListener('DOMContentLoaded',ProjetosTracker.init);
  </script>
</body>
</html>
